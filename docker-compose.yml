services:
  # Frontend - Site web Toilettage Animaux
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toilettage-v5-frontend
    ports:
      - "127.0.0.1:8084:80"
    restart: unless-stopped
    networks:
      - unified-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.toilettage-v5.rule=Host(`toilettage-v5.privateip.org`)"
      - "traefik.http.routers.toilettage-v5.entrypoints=websecure"
      - "traefik.http.routers.toilettage-v5.tls=true"
      - "traefik.http.services.toilettage-v5.loadbalancer.server.port=80"

networks:
  unified-net:
    external: true
    name: unified-net
